# sonar-project.properties
# Cấu hình SonarCloud cho dự án ScrapTech (React Native / Expo)

# ── Định danh dự án ──────────────────────────────────────────────────────────
# projectKey = <organization>_<repository> (theo quy tắc SonarCloud)
sonar.projectKey=thiet28_ScrapTech
sonar.organization=thiet28

# Tên và phiên bản hiển thị trên SonarCloud dashboard
sonar.projectName=ScrapTech Mobile
sonar.projectVersion=1.0.0

# ── Nguồn mã nguồn ───────────────────────────────────────────────────────────
sonar.sources=app,src
sonar.tests=__tests__

# Các file/thư mục bỏ qua khi phân tích
sonar.exclusions=\
  **/node_modules/**,\
  **/__mocks__/**,\
  **/coverage/**,\
  **/*.d.ts,\
  **/assets/**,\
  **/android/**,\
  **/ios/**

sonar.test.inclusions=**/__tests__/**/*.test.tsx,**/__tests__/**/*.test.ts

# ── Ngôn ngữ & encoding ──────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ── Báo cáo coverage (lcov từ Jest) ─────────────────────────────────────────
# File này được tạo khi chạy: npx jest --coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── TypeScript ────────────────────────────────────────────────────────────────
sonar.typescript.tsconfigPath=tsconfig.json
